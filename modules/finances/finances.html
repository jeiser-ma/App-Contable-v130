<div class="d-flex flex-column gap-2">
  <!-- Sección: Puntos de venta -->
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h6 class="mb-0"><i class="bi bi-shop"></i> Puntos de Venta</h6>
    </div>
    <div class="card-body">
      <div id="alertNoStores" class="alert alert-warning d-none">
        <i class="bi bi-exclamation-triangle"></i>
        <strong>No hay puntos de venta activos.</strong>
        <button id="btnGoToStores" class="btn btn-chip btn-warning rounded-pill" type="button">
          Ir a Puntos de Venta
          <i class="bi bi-chevron-right small"></i>
        </button>
      </div>

      <!-- TEMPLATE: Card de PV (estilo contabilidad: nombre + montos) -->
      <template id="financeStoreCardTemplate">
        <div class="card shadow-sm">
          <div class="card-body py-2 px-3">
            <div class="mb-2">
              <span class="fw-semibold finance-store-name">PV name</span>
            </div>
            <div class="d-flex flex-wrap gap-3 pt-1 small text-muted fw-semibold">
              <div>
                <i class="bi bi-cash-stack text-primary"></i>
                CUP
                <span class="finance-store-cup">0.00</span>
              </div>
              <div>
                <i class="bi bi-currency-dollar text-success"></i>
                USD
                <span class="finance-store-usd">0.00</span>
              </div>
              <div>
                <i class="bi bi-credit-card text-info"></i>
                TRANS
                <span class="finance-store-transfer">0.00</span>
              </div>
            </div>
          </div>
        </div>
      </template>

      <div id="financeStoresList" class="d-grid gap-2">
        <!-- Cards de PV -->
      </div>

      <div class="mt-3">
        <button class="btn btn-primary w-100 rounded-pill" id="btnAddStoreAmount" type="button">
          <i class="bi bi-plus"></i> Agregar
        </button>
      </div>
    </div>
  </div>

  <!-- Sección: Salidas (estilo gastos) -->
  <div class="card shadow-sm">
    <div class="card-header bg-danger text-white">
      <h6 class="mb-0"><i class="bi bi-box-arrow-up"></i> Salidas</h6>
    </div>
    <div class="card-body">
      <div class="d-grid gap-2">
        <div class="card shadow-sm">
          <div class="card-body py-2 px-3">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-cash-stack text-danger"></i>
                <span class="fw-semibold">CUP</span>
              </div>
              <span class="text-danger fw-semibold" id="financeOutputsCup">0.00</span>
            </div>
          </div>
        </div>
        <div class="card shadow-sm">
          <div class="card-body py-2 px-3">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-currency-dollar text-danger"></i>
                <span class="fw-semibold">USD</span>
              </div>
              <span class="text-danger fw-semibold" id="financeOutputsUsd">0.00</span>
            </div>
          </div>
        </div>
        <div class="card shadow-sm">
          <div class="card-body py-2 px-3">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-2">
                <i class="bi bi-credit-card text-danger"></i>
                <span class="fw-semibold">TRANS</span>
              </div>
              <span class="text-danger fw-semibold" id="financeOutputsTransfer">0.00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-danger w-100 rounded-pill" id="btnAddOutputsAmount" type="button">
          <i class="bi bi-plus"></i> Agregar
        </button>
      </div>
    </div>
  </div>

  <!-- Sección: Total de hoy -->
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h6 class="mb-0"><i class="bi bi-calendar-check"></i> Total de hoy</h6>
    </div>
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span><i class="bi bi-cash-stack text-primary"></i> CUP</span>
        <span class="fw-semibold text-primary" id="financeDailyCup">0</span>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span><i class="bi bi-currency-dollar text-success"></i> USD</span>
        <span class="fw-semibold text-success" id="financeDailyUsd">0</span>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <span><i class="bi bi-credit-card text-info"></i> TRANS</span>
        <span class="fw-semibold text-info" id="financeDailyTransfer">0</span>
      </div>
    </div>
  </div>

  <!-- Sección: Total General -->
  <div class="card shadow-sm">
    <div class="card-header bg-warning text-dark">
      <h6 class="mb-0"><i class="bi bi-bar-chart"></i> Total General</h6>
    </div>
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span><i class="bi bi-cash-stack text-primary"></i> CUP</span>
        <span class="fw-semibold text-primary" id="financeGeneralCup">0</span>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span><i class="bi bi-currency-dollar text-success"></i> USD</span>
        <span class="fw-semibold text-success" id="financeGeneralUsd">0</span>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <span><i class="bi bi-credit-card text-info"></i> TRANS</span>
        <span class="fw-semibold text-info" id="financeGeneralTransfer">0</span>
      </div>
    </div>
  </div>

  <!-- Exportar finanzas -->
  <div class="border-top pt-2 mt-2">
    <button class="btn btn-outline-primary rounded-pill d-flex align-items-center w-100 px-1 py-1 mt-3"
      id="btnExportFinances" type="button">
      <span class="px-3 text-primary rounded-pill bg-primary text-white">
        <i class="bi bi-filetype-csv fs-5"></i>
      </span>
      <span class="flex-grow-1">
        Exportar finanzas
        <i class="bi bi-cloud-download fs-5 px-2"></i>
      </span>
    </button>
  </div>
</div>
