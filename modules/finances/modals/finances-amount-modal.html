<div class="modal fade" id="finances-amount-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title d-flex align-items-center gap-2">
          <i id="financeAmountModalIcon" class="bi bi-cash-coin text-primary"></i>
          <span id="financeAmountModalTitle">Agregar monto</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <form id="financeAmountForm">
          <!-- Contexto fijo para Salidas -->
          <div id="financeAmountOutputsContext" class="mb-3 p-2 border rounded bg-light d-none">
            <div class="fw-semibold">Salidas</div>
            <div class="small text-muted">Seleccioná la moneda y la cantidad</div>
          </div>

          <!-- Select PV (solo para sección Puntos de Venta) -->
          <div class="mb-2" id="financeAmountStoreGroup">
            <label for="financeAmountStore" class="form-label small">Punto de venta</label>
            <select class="form-select form-select-sm" id="financeAmountStore">
              <option value="" selected disabled>Seleccioná un punto de venta...</option>
            </select>
            <div class="invalid-feedback">Seleccioná un punto de venta</div>
          </div>

          <!-- Select moneda -->
          <div class="mb-2">
            <label for="financeAmountCurrency" class="form-label small">Moneda</label>
            <select class="form-select form-select-sm" id="financeAmountCurrency">
              <option value="" selected disabled>Seleccioná una moneda...</option>
              <option value="CUP">CUP</option>
              <option value="USD">USD</option>
              <option value="TRANSFER">TRANS</option>
            </select>
            <div class="invalid-feedback">Seleccioná una moneda</div>
          </div>

          <!-- Cantidad -->
          <div class="mb-2">
            <label for="financeAmountInput" class="form-label small">Cantidad</label>
            <input
              type="number"
              id="financeAmountInput"
              class="form-control form-control-sm"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
            <div class="invalid-feedback">Ingresá una cantidad válida</div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary rounded-pill btn-sm" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary rounded-pill btn-sm" id="btnConfirmFinanceAmount">
          Guardar
        </button>
      </div>
    </div>
  </div>
</div>
